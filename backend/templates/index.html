<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson's Tremor Monitor - Raw Data Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script async src="https://unpkg.com/es-module-shims@1.10.0"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc; 
            overflow: hidden; 
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        .data-card {
            background-color: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(148, 163, 184, 0.2); 
            backdrop-filter: blur(12px);
            z-index: 10;
        }
    </style>
    <link href="https://fonts.googleapis.com/css?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased">
    <!-- Invisible div triggers HTMX request to fetch updated data -->
    <div hx-get="/data" hx-trigger="every 50ms" hx-swap="none"></div>
    
    <!-- 3D Visualization Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="absolute top-0 left-8 p-4 sm:p-6 lg:p-8 w-full max-w-lg pointer-events-none z-10">
        <header class="mb-4">
            <h1 class="text-3xl font-bold tracking-tight text-white drop-shadow-md">Raw Sensor Visualizer</h1>
            <p class="text-sm font-medium tracking-wide text-sky-400 mt-1 uppercase">Parkinson's Tremor Lab</p>
        </header>

        <!-- Sensor Data Panel -->
        <div class="data-card rounded-2xl shadow-2xl p-6 pointer-events-auto transition-all duration-300">
            <div id="data-display" class="animate-pulse text-slate-400 font-medium">
                Waiting for serial data...
            </div>
        </div>
    </div>

    <!-- JS Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, cube, controls;
        const dataDisplay = document.getElementById('data-display');
        const canvasContainer = document.getElementById('canvas-container');

        function init() {
            scene = new THREE.Scene();
            // Match tailwind background
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2.5, 3.5, 4.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize performance
            // Soft shadows
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            canvasContainer.appendChild(renderer.domElement);

            // Lighting setup for a dynamic, premium look
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x0ea5e9, 2, 10);
            pointLight.position.set(-2, 2, -2);
            scene.add(pointLight);

            // The Sensor Cube model
            const geometry = new THREE.BoxGeometry(2, 0.2, 3);
            const material = new THREE.MeshStandardMaterial({
                color: 0x38bdf8, 
                roughness: 0.3,
                metalness: 0.4,
            });
            
            cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            
            // Add xyz axes to see orientation visually
            const axesHelper = new THREE.AxesHelper(3);
            cube.add(axesHelper);

            // Ground grid to visualize space
            const gridHelper = new THREE.GridHelper(20, 20, 0x334155, 0x1e293b);
            gridHelper.position.y = -1.5;
            scene.add(gridHelper);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // needed for damping
            renderer.render(scene, camera);
        }

        document.body.addEventListener('htmx:afterOnLoad', function(event) {
            if (event.detail.pathInfo.requestPath === '/data') {
                try {
                    const data = JSON.parse(event.detail.xhr.responseText);
                    
                    if (cube && data.raw_ax !== undefined) {
                        // Apply rotation based on the Python Complementary Filter results
                        const pitchRad = THREE.MathUtils.degToRad(data.pitch);
                        const rollRad = THREE.MathUtils.degToRad(data.roll);
                        const yawRad = THREE.MathUtils.degToRad(data.yaw);
                        
                        // Three.js uses XYZ order normally, but sensor axes mapping might need tuning 
                        // based on physical chip orientation. Adjust order if it misbehaves.
                        cube.rotation.set(pitchRad, yawRad, rollRad, 'XYZ');
                    }

                    if (dataDisplay && data.raw_ax !== undefined) {
                        dataDisplay.classList.remove('animate-pulse');
                        dataDisplay.innerHTML = `
                            <div class="flex flex-col gap-5 font-mono text-sm">
                                <div>
                                    <h3 class="font-bold text-sky-400 mb-2 border-b border-sky-400/20 pb-1 flex items-center justify-between">
                                        Estimated Angle
                                        <span class="text-xs font-normal text-slate-500 font-sans">Filtered Fusion</span>
                                    </h3>
                                    <div class="grid grid-cols-3 gap-2 text-slate-300">
                                        <div class="bg-slate-800/50 rounded p-2 text-center border border-slate-700/50">
                                            <div class="text-[0.65rem] uppercase tracking-wider text-slate-400 mb-1">Pitch</div>
                                            <div class="font-semibold">${data.pitch.toFixed(1)}&deg;</div>
                                        </div>
                                        <div class="bg-slate-800/50 rounded p-2 text-center border border-slate-700/50">
                                            <div class="text-[0.65rem] uppercase tracking-wider text-slate-400 mb-1">Roll</div>
                                            <div class="font-semibold">${data.roll.toFixed(1)}&deg;</div>
                                        </div>
                                        <div class="bg-slate-800/50 rounded p-2 text-center border border-slate-700/50">
                                            <div class="text-[0.65rem] uppercase tracking-wider text-slate-400 mb-1">Yaw</div>
                                            <div class="font-semibold">${data.yaw.toFixed(1)}&deg;</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div>
                                    <h3 class="font-bold text-emerald-400 mb-2 border-b border-emerald-400/20 pb-1 flex items-center justify-between">
                                        Raw Accel (I2C)
                                        <span class="text-xs font-normal text-slate-500 font-sans">LSB</span>
                                    </h3>
                                    <div class="grid grid-cols-3 gap-2 text-slate-300">
                                        <div class="flex justify-between items-center"><span class="text-slate-500">X:</span><span>${data.raw_ax}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-slate-500">Y:</span><span>${data.raw_ay}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-slate-500">Z:</span><span>${data.raw_az}</span></div>
                                    </div>
                                </div>

                                <div>
                                    <h3 class="font-bold text-purple-400 mb-2 border-b border-purple-400/20 pb-1 flex items-center justify-between">
                                        Raw Gyro (I2C)
                                        <span class="text-xs font-normal text-slate-500 font-sans">LSB</span>
                                    </h3>
                                    <div class="grid grid-cols-3 gap-2 text-slate-300">
                                        <div class="flex justify-between items-center"><span class="text-slate-500">X:</span><span>${data.raw_gx}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-slate-500">Y:</span><span>${data.raw_gy}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-slate-500">Z:</span><span>${data.raw_gz}</span></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                } catch (e) {
                    // Suppress parse errors quietly if serial buffer got chopped
                }
            }
        });

        init();
    </script>
</body>
</html>
